
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Management System</title>
<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    padding: 20px;
}
.container {
    max-width: 800px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}
input, select, button {
    margin: 5px;
    padding: 8px;
}
button {
    cursor: pointer;
}
.user {
    background: #eee;
    padding: 10px;
    margin-top: 10px;
    border-radius: 5px;
}
.actions button {
    margin-right: 5px;
}
</style>
</head>
<body>

<div class="container">
    <h2>User Management System</h2>

    <input id="name" placeholder="Name">
    <input id="email" placeholder="Email">
    <input id="age" type="number" placeholder="Age">
    <input id="specialization" placeholder="Specialization">

    <button onclick="AddUser()" id="mainBtn">Add User</button>

    <br><br>

    <input id="search" placeholder="Search by name" onkeyup="SearchUser()">

    <div id="usersList"></div>
</div>
<script src="UserSystem.js"></script>
</body>
</html>
